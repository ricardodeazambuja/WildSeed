# CI: unit tests + CPU-side determinism gates on every push/PR.
#
# Scope: pip-clean tests only. GDAL-dependent tests (GeoTIFF write) and
# Blender/GPU paths skip automatically (see tests/*: skipif GDAL_AVAILABLE /
# BLENDER / importorskip cv2). The full byte-determinism gate (mesh + ground
# bake + placement) needs the pinned wildseed:egl container and runs locally —
# this workflow protects the resolution/spec layer from silent drift.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" opencv-python-headless
      - name: Test
        run: pytest -q
